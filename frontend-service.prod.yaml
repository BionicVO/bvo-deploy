# Cloud Run service manifest for bvo-new (frontend) — production.
# `image: frontend` below is a bare artifact-key placeholder, not a real
# path — Skaffold/Cloud Deploy matches it against the `--images=frontend=...`
# key at release time and swaps in the actual pushed image URI. It must
# stay exactly "frontend" (no registry prefix) or the substitution silently
# doesn't happen and Cloud Run tries to pull the literal placeholder text
# as an image reference (this bit us once — see trigger-setup.md).

apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: bvo-frontend-prod
  labels:
    app: bvo-frontend
    env: prod
spec:
  template:
    metadata:
      annotations:
        autoscaling.knative.dev/minScale: "0"
        autoscaling.knative.dev/maxScale: "10"
    spec:
      containerConcurrency: 100
      containers:
        - image: frontend
          ports:
            - containerPort: 8080
          resources:
            limits:
              cpu: "1"
              memory: 256Mi
