# Cloud Run service manifest for bvo-api (backend) — production.
# `image: backend` below is a bare artifact-key placeholder, not a real
# path — Skaffold/Cloud Deploy matches it against the `--images=backend=...`
# key at release time and swaps in the actual pushed image URI. It must
# stay exactly "backend" (no registry prefix) or the substitution silently
# doesn't happen and Cloud Run tries to pull the literal placeholder text
# as an image reference (this bit us once — see trigger-setup.md).
# Points at the PROD Cloud SQL (PostgreSQL) instance and PROD Memorystore
# for Valkey instance, and prod (live) third-party keys.

apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: bvo-backend-prod
  labels:
    app: bvo-backend
    env: prod
spec:
  template:
    metadata:
      annotations:
        autoscaling.knative.dev/minScale: "1"
        autoscaling.knative.dev/maxScale: "20"
        run.googleapis.com/vpc-access-connector: bvo-vpc-connector
        run.googleapis.com/vpc-access-egress: private-ranges-only
    spec:
      containerConcurrency: 80
      containers:
        - image: backend
          ports:
            - containerPort: 3000
          env:
            # PORT is deliberately not set here — Cloud Run reserves that
            # name and injects it automatically to match containerPort
            # above. Setting it manually causes deployment to fail.
            - name: NODE_ENV
              value: "production"
            # bootstrap.ts builds its CORS allowlist from CLIENT_URLS (falls
            # back to APP_URL, comma-separated). Note: bootstrap.ts also
            # skips the allowlist entirely (corsOptions = {}) when
            # SERVER_CONFIG.ENV === "PROD" (an exact-match check against a
            # separate ENV var, not NODE_ENV, which is not set anywhere in
            # this manifest) — so CORS stays locked to this explicit list
            # here rather than accidentally opening wide.
            - name: CLIENT_URLS
              value: "https://bvo-frontend-prod-516740748317.us-central1.run.app"
            - name: DB_SSL
              value: "true"
            - name: DB_HOST
              valueFrom:
                secretKeyRef:
                  name: bvo-db-host-prod
                  key: "latest"
            - name: DB_PORT
              valueFrom:
                secretKeyRef:
                  name: bvo-db-port-prod
                  key: "latest"
            - name: DB_USERNAME
              valueFrom:
                secretKeyRef:
                  name: bvo-db-username-prod
                  key: "latest"
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: bvo-db-password-prod
                  key: "latest"
            - name: DB_NAME
              valueFrom:
                secretKeyRef:
                  name: bvo-db-name-prod
                  key: "latest"
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: bvo-redis-url-prod
                  key: "latest"
            # Required at startup — ElevenLabsClientService.js constructs
            # the ElevenLabs SDK client at module import time (not lazily),
            # and the SDK itself reads this exact env var name if no key is
            # passed explicitly. Missing this crashes the whole process
            # before it can bind to PORT, which Cloud Run reports as a
            # generic "container failed to start and listen on the port"
            # health-check failure — worth remembering if this env var ever
            # gets accidentally removed.
            - name: ELEVENLABS_API_KEY
              valueFrom:
                secretKeyRef:
                  name: bvo-elevenlabs-key-prod
                  key: "latest"
            # Required — JwtService signs/verifies all auth tokens with
            # SERVER_CONFIG.SECRET (process.env.SECRET). Missing this makes
            # every login fail with a 400 "secretOrPrivateKey must have a
            # value" error from the jsonwebtoken library, even though the
            # request itself is otherwise fine.
            - name: SECRET
              valueFrom:
                secretKeyRef:
                  name: bvo-jwt-secret-prod
                  key: "latest"
            # STRIPE_SECRET_KEY intentionally not injected here — Stripe
            # key handling is managed inside the app itself, not via this
            # Cloud Run manifest/Secret Manager.
          resources:
            limits:
              cpu: "1"
              memory: 512Mi
