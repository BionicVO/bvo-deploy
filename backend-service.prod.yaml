# Cloud Run service manifest for bvo-api (backend) — production.
# Image tag is a placeholder — Cloud Deploy overwrites it at release time
# via `--images=backend=<resolved-image>`.
# Points at the PROD Cloud SQL (PostgreSQL) instance and PROD Memorystore
# for Valkey instance, and prod (live) third-party keys.

apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: bvo-backend-prod
  labels:
    app: bvo-backend
    env: prod
spec:
  template:
    metadata:
      annotations:
        autoscaling.knative.dev/minScale: "1"
        autoscaling.knative.dev/maxScale: "20"
        run.googleapis.com/vpc-access-connector: bvo-vpc-connector
        run.googleapis.com/vpc-access-egress: private-ranges-only
    spec:
      containerConcurrency: 80
      containers:
        - image: REGION-docker.pkg.dev/PROJECT_ID/bvo-images/backend:latest
          ports:
            - containerPort: 3000
          env:
            # PORT is deliberately not set here — Cloud Run reserves that
            # name and injects it automatically to match containerPort
            # above. Setting it manually causes deployment to fail.
            - name: NODE_ENV
              value: "production"
            - name: DB_SSL
              value: "true"
            - name: DB_HOST
              valueFrom:
                secretKeyRef:
                  name: bvo-db-host-prod
                  key: "latest"
            - name: DB_PORT
              valueFrom:
                secretKeyRef:
                  name: bvo-db-port-prod
                  key: "latest"
            - name: DB_USERNAME
              valueFrom:
                secretKeyRef:
                  name: bvo-db-username-prod
                  key: "latest"
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: bvo-db-password-prod
                  key: "latest"
            - name: DB_NAME
              valueFrom:
                secretKeyRef:
                  name: bvo-db-name-prod
                  key: "latest"
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: bvo-redis-url-prod
                  key: "latest"
            # STRIPE_SECRET_KEY intentionally not injected here — Stripe
            # key handling is managed inside the app itself, not via this
            # Cloud Run manifest/Secret Manager.
          resources:
            limits:
              cpu: "1"
              memory: 512Mi
