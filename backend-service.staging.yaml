# Cloud Run service manifest for bvo-api (backend) — staging.
# `image: backend` below is a bare artifact-key placeholder, not a real
# path — Skaffold/Cloud Deploy matches it against the `--images=backend=...`
# key at release time and swaps in the actual pushed image URI. It must
# stay exactly "backend" (no registry prefix) or the substitution silently
# doesn't happen and Cloud Run tries to pull the literal placeholder text
# as an image reference (this bit us once — see trigger-setup.md).
# Points at the STAGING Cloud SQL (PostgreSQL) instance and STAGING
# Memorystore for Valkey instance — separate from prod's, so staging never
# touches production data. Secrets are separate per environment too.

apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: bvo-backend-staging
  labels:
    app: bvo-backend
    env: staging
spec:
  template:
    metadata:
      annotations:
        autoscaling.knative.dev/minScale: "0"
        autoscaling.knative.dev/maxScale: "5"
        run.googleapis.com/vpc-access-connector: bvo-vpc-connector
        run.googleapis.com/vpc-access-egress: private-ranges-only
    spec:
      containerConcurrency: 80
      containers:
        - image: backend
          ports:
            - containerPort: 3000
          env:
            # PORT is deliberately not set here — Cloud Run reserves that
            # name and injects it automatically to match containerPort
            # above. Setting it manually causes deployment to fail.
            - name: NODE_ENV
              value: "staging"
            - name: DB_SSL
              value: "true"
            - name: DB_HOST
              valueFrom:
                secretKeyRef:
                  name: bvo-db-host-staging
                  key: "latest"
            - name: DB_PORT
              valueFrom:
                secretKeyRef:
                  name: bvo-db-port-staging
                  key: "latest"
            - name: DB_USERNAME
              valueFrom:
                secretKeyRef:
                  name: bvo-db-username-staging
                  key: "latest"
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: bvo-db-password-staging
                  key: "latest"
            - name: DB_NAME
              valueFrom:
                secretKeyRef:
                  name: bvo-db-name-staging
                  key: "latest"
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: bvo-redis-url-staging
                  key: "latest"
            # Required at startup — ElevenLabsClientService.js constructs
            # the ElevenLabs SDK client at module import time (not lazily),
            # and the SDK itself reads this exact env var name if no key is
            # passed explicitly. Missing this crashes the whole process
            # before it can bind to PORT, which Cloud Run reports as a
            # generic "container failed to start and listen on the port"
            # health-check failure — worth remembering if this env var ever
            # gets accidentally removed.
            - name: ELEVENLABS_API_KEY
              valueFrom:
                secretKeyRef:
                  name: bvo-elevenlabs-key-staging
                  key: "latest"
            # STRIPE_SECRET_KEY intentionally not injected here — Stripe
            # key handling is managed inside the app itself, not via this
            # Cloud Run manifest/Secret Manager.
          resources:
            limits:
              cpu: "1"
              memory: 512Mi
