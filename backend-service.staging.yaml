# Cloud Run service manifest for bvo-api (backend) — staging.
# Image tag is a placeholder — Cloud Deploy overwrites it at release time
# via `--images=backend=<resolved-image>`.
# Points at the STAGING Cloud SQL (PostgreSQL) instance and STAGING
# Memorystore for Valkey instance — separate from prod's, so staging never
# touches production data. Secrets are separate per environment too.

apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: bvo-backend-staging
  labels:
    app: bvo-backend
    env: staging
spec:
  template:
    metadata:
      annotations:
        autoscaling.knative.dev/minScale: "0"
        autoscaling.knative.dev/maxScale: "5"
        run.googleapis.com/vpc-access-connector: bvo-vpc-connector
        run.googleapis.com/vpc-access-egress: private-ranges-only
    spec:
      containerConcurrency: 80
      containers:
        - image: REGION-docker.pkg.dev/PROJECT_ID/bvo-images/backend:latest
          ports:
            - containerPort: 3000
          env:
            # PORT is deliberately not set here — Cloud Run reserves that
            # name and injects it automatically to match containerPort
            # above. Setting it manually causes deployment to fail.
            - name: NODE_ENV
              value: "staging"
            - name: DB_HOST
              valueFrom:
                secretKeyRef:
                  name: bvo-db-host-staging
                  key: "latest"
            - name: DB_PORT
              valueFrom:
                secretKeyRef:
                  name: bvo-db-port-staging
                  key: "latest"
            - name: DB_USERNAME
              valueFrom:
                secretKeyRef:
                  name: bvo-db-username-staging
                  key: "latest"
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: bvo-db-password-staging
                  key: "latest"
            - name: DB_NAME
              valueFrom:
                secretKeyRef:
                  name: bvo-db-name-staging
                  key: "latest"
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: bvo-redis-url-staging
                  key: "latest"
            - name: STRIPE_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: bvo-stripe-secret-staging
                  key: "latest"
          resources:
            limits:
              cpu: "1"
              memory: 512Mi
